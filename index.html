<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f6f6f4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
  <title>Daily briefing</title>
  <style>
    :root {
      --bg: #f6f6f4;
      --fg: #1a1a18;
      --muted: #5c5c56;
      --border: #d9d9d4;
      --accent: #2563eb;
      --code-bg: #ecece8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --fg: #f0f0ec;
        --muted: #a3a39b;
        --border: #3d3d38;
        --accent: #60a5fa;
        --code-bg: #2a2a26;
      }
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 1.0625rem;
      line-height: 1.55;
      background: var(--bg);
      color: var(--fg);
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
    }
    .wrap {
      max-width: 38rem;
      margin: 0 auto;
    }
    header {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1.site {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .meta {
      font-size: 0.875rem;
      color: var(--muted);
      margin: 0;
    }
    .content :first-child { margin-top: 0; }
    .content h1 { font-size: 1.5rem; margin: 1.25rem 0 0.75rem; letter-spacing: -0.02em; }
    .content h2 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
    .content h3 { font-size: 1.05rem; margin: 1.25rem 0 0.5rem; }
    .content p { margin: 0.75rem 0; }
    .content ul, .content ol { margin: 0.75rem 0; padding-left: 1.35rem; }
    .content li { margin: 0.35rem 0; }
    .content a { color: var(--accent); text-underline-offset: 0.15em; }
    .content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.9em;
      background: var(--code-bg);
      padding: 0.15em 0.35em;
      border-radius: 4px;
    }
    .content pre {
      overflow-x: auto;
      background: var(--code-bg);
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.45;
    }
    .content pre code { background: none; padding: 0; }
    .content blockquote {
      margin: 1rem 0;
      padding-left: 1rem;
      border-left: 3px solid var(--border);
      color: var(--muted);
    }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      margin: 1rem 0;
    }
    .content th,
    .content td {
      border: 1px solid var(--border);
      padding: 0.45rem 0.55rem;
      vertical-align: top;
    }
    .content th { background: color-mix(in srgb, var(--code-bg) 85%, var(--bg)); }
    .content { overflow-x: auto; }
    .error {
      padding: 1rem 1.1rem;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 12%, var(--bg));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
      font-size: 0.95rem;
    }
    .error code { font-size: 0.85em; }
    footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="site" id="page-title">Daily briefing</h1>
      <p class="meta" id="page-meta"></p>
    </header>
    <main id="main">
      <p class="meta">Loading…</p>
    </main>
    <footer id="footer" hidden></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var CURRENT_JSON = "briefings/current.json";

      function parseFrontMatter(text) {
        if (text.slice(0, 4) !== "---\n") return { attrs: {}, body: text };
        var end = text.indexOf("\n---\n", 4);
        if (end === -1) return { attrs: {}, body: text };
        var yaml = text.slice(4, end);
        var body = text.slice(end + 5);
        var attrs = {};
        yaml.split("\n").forEach(function (line) {
          var m = line.match(/^([a-zA-Z0-9_]+):\s*(.*)$/);
          if (m) attrs[m[1]] = m[2].replace(/^["']|["']$/g, "").trim();
        });
        return { attrs: attrs, body: body };
      }

      function firstMarkdownH1(body) {
        var m = body.match(/^\s*#\s+(.+)$/m);
        return m ? m[1].trim() : "";
      }

      function dateFromFilename(name) {
        var m = name && name.match(/^(\d{4}-\d{2}-\d{2})\.md$/);
        return m ? m[1] : "";
      }

      function formatMeta(attrs, fetchedAt, sourceName) {
        var parts = [];
        if (attrs.date) parts.push(attrs.date);
        else if (sourceName) {
          var d = dateFromFilename(sourceName);
          if (d) parts.push(d);
        }
        if (fetchedAt) parts.push("Loaded " + fetchedAt.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }));
        return parts.join(" · ");
      }

      function showError(msg) {
        var main = document.getElementById("main");
        main.innerHTML = '<div class="error" role="alert">' + msg + "</div>";
      }

      marked.setOptions({
        gfm: true,
        breaks: true,
        mangle: false,
        headerIds: true
      });

      function loadMarkdown(url, sourceName) {
        return fetch(url, { cache: "no-store" }).then(function (r) {
          if (!r.ok) throw new Error("Could not load <code>" + url + "</code> (" + r.status + ").");
          return r.text().then(function (raw) {
            return { raw: raw, url: url, sourceName: sourceName || url.split("/").pop() };
          });
        });
      }

      fetch(CURRENT_JSON, { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) {
            throw new Error("Could not load <code>" + CURRENT_JSON + "</code> (" + r.status + ").");
          }
          return r.json();
        })
        .then(function (j) {
          var name = (j && j.file) || "";
          if (!name || !/^\d{4}-\d{2}-\d{2}\.md$/.test(name)) {
            throw new Error("Set <code>file</code> in current.json to a dated name like <code>2026-08-04.md</code>.");
          }
          return loadMarkdown("briefings/" + name, name);
        })
        .then(function (result) {
          var raw = result.raw;
          var sourceName = result.sourceName;
          var parsed = parseFrontMatter(raw);
          var attrs = parsed.attrs;
          var body = parsed.body;

          var title = attrs.title || firstMarkdownH1(body);
          if (title) {
            document.getElementById("page-title").textContent = title;
            document.title = title.length > 48 ? title.slice(0, 45) + "… · Briefing" : title + " · Briefing";
          }

          var fetchedAt = new Date();
          document.getElementById("page-meta").textContent = formatMeta(attrs, fetchedAt, sourceName);

          var html = marked.parse(body);
          var clean = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
          document.getElementById("main").innerHTML = '<article class="content">' + clean + "</article>";

          var foot = document.getElementById("footer");
          foot.hidden = false;
          foot.textContent = "Tip: add this page to your Home Screen for quick access.";
        })
        .catch(function (e) {
          document.getElementById("page-meta").textContent = "";
          showError(
            (e && e.message ? e.message : "Failed to load briefing.") +
              " Add <code>briefings/YYYY-MM-DD.md</code> and point <code>file</code> in <code>briefings/current.json</code> at it. Push and ensure GitHub Pages is enabled."
          );
        });
    })();
  </script>
</body>
</html>
