<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f6f6f4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
  <title>Daily briefing</title>
  <style>
    :root {
      --font-scale: 1.25;
      --bg: #f6f6f4;
      --fg: #1a1a18;
      --muted: #5c5c56;
      --border: #d9d9d4;
      --accent: #2563eb;
      --code-bg: #ecece8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --fg: #f0f0ec;
        --muted: #a3a39b;
        --border: #3d3d38;
        --accent: #60a5fa;
        --code-bg: #2a2a26;
      }
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      font-size: calc(16px * var(--font-scale));
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 1.1875rem;
      line-height: 1.6;
      background: var(--bg);
      color: var(--fg);
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
    }
    .wrap {
      max-width: 38rem;
      margin: 0 auto;
    }
    header.site-header {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem 1rem;
    }
    .font-tools {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      flex-shrink: 0;
    }
    .font-tools button {
      min-width: 2.75rem;
      min-height: 2.75rem;
      padding: 0.35rem 0.5rem;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--code-bg) 55%, var(--bg));
      color: var(--fg);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .font-tools button:hover {
      background: var(--code-bg);
    }
    .font-tools button:active {
      background: color-mix(in srgb, var(--border) 40%, var(--code-bg));
    }
    .font-tools button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }
    .font-tools .font-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-right: 0.15rem;
      user-select: none;
    }
    h1.site {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
      font-variant-numeric: tabular-nums;
    }
    .content :first-child { margin-top: 0; }
    .content h1 { font-size: 1.65rem; margin: 1.25rem 0 0.75rem; letter-spacing: -0.02em; }
    .content h2 { font-size: 1.35rem; margin: 1.5rem 0 0.5rem; }
    .content h3 { font-size: 1.15rem; margin: 1.25rem 0 0.5rem; }
    .content p { margin: 0.75rem 0; }
    .content ul, .content ol { margin: 0.75rem 0; padding-left: 1.35rem; }
    .content li { margin: 0.35rem 0; }
    .content a { color: var(--accent); text-underline-offset: 0.15em; }
    .content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      padding: 0.15em 0.35em;
      border-radius: 4px;
    }
    .content pre {
      overflow-x: auto;
      background: var(--code-bg);
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .content pre code { background: none; padding: 0; }
    .content blockquote {
      margin: 1rem 0;
      padding-left: 1rem;
      border-left: 3px solid var(--border);
      color: var(--muted);
    }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.98rem;
      margin: 1rem 0;
    }
    .content th,
    .content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.6rem;
      vertical-align: top;
    }
    .content th { background: color-mix(in srgb, var(--code-bg) 85%, var(--bg)); }
    .content { overflow-x: auto; }
    .error {
      padding: 1rem 1.1rem;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 12%, var(--bg));
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
      font-size: 1rem;
    }
    .error code { font-size: 0.85em; }
    footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }
    footer p { margin: 0.4rem 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <h1 class="site" id="page-title">…</h1>
      <div class="font-tools" role="group" aria-label="Text size">
        <span class="font-label" id="font-percent" aria-hidden="true"></span>
        <button type="button" id="font-smaller" title="Smaller text" aria-label="Smaller text">A−</button>
        <button type="button" id="font-reset" title="Default text size" aria-label="Reset text size">A</button>
        <button type="button" id="font-larger" title="Larger text" aria-label="Larger text">A+</button>
      </div>
    </header>
    <main id="main">
      <p style="color: var(--muted); margin: 0;">Loading…</p>
    </main>
    <footer id="footer" hidden>
      <p id="footer-meta"></p>
      <p>Tip: add this page to your Home Screen for quick access. Text size is saved on this device.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var FONT_KEY = "briefingFontScale";
      var FONT_DEFAULT = 1.25;
      var FONT_MIN = 0.85;
      var FONT_MAX = 1.85;
      var FONT_STEP = 0.1;

      function fontRound(x) {
        return Math.round(x * 100) / 100;
      }

      function fontRead() {
        var v = parseFloat(localStorage.getItem(FONT_KEY), 10);
        if (isNaN(v)) return FONT_DEFAULT;
        return fontRound(Math.min(FONT_MAX, Math.max(FONT_MIN, v)));
      }

      function fontApply(s) {
        s = fontRound(Math.min(FONT_MAX, Math.max(FONT_MIN, s)));
        document.documentElement.style.setProperty("--font-scale", String(s));
        localStorage.setItem(FONT_KEY, String(s));
        var pct = document.getElementById("font-percent");
        var sm = document.getElementById("font-smaller");
        var lg = document.getElementById("font-larger");
        if (pct) pct.textContent = Math.round(s * 100) + "%";
        if (sm) sm.disabled = s <= FONT_MIN + 0.001;
        if (lg) lg.disabled = s >= FONT_MAX - 0.001;
      }

      function fontInit() {
        fontApply(fontRead());
        var sm = document.getElementById("font-smaller");
        var rs = document.getElementById("font-reset");
        var lg = document.getElementById("font-larger");
        if (sm) {
          sm.addEventListener("click", function () {
            fontApply(fontRead() - FONT_STEP);
          });
        }
        if (rs) {
          rs.addEventListener("click", function () {
            fontApply(FONT_DEFAULT);
          });
        }
        if (lg) {
          lg.addEventListener("click", function () {
            fontApply(fontRead() + FONT_STEP);
          });
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", fontInit);
      } else {
        fontInit();
      }
    })();
  </script>
  <script>
    (function () {
      var BRIEFING_URL = "briefings/latest.md";
      var ISO_DATE = /^(\d{4})-(\d{2})-(\d{2})$/;

      function parseFrontMatter(text) {
        if (text.slice(0, 4) !== "---\n") return { attrs: {}, body: text };
        var end = text.indexOf("\n---\n", 4);
        if (end === -1) return { attrs: {}, body: text };
        var yaml = text.slice(4, end);
        var body = text.slice(end + 5);
        var attrs = {};
        yaml.split("\n").forEach(function (line) {
          var m = line.match(/^([a-zA-Z0-9_]+):\s*(.*)$/);
          if (m) attrs[m[1]] = m[2].replace(/^["']|["']$/g, "").trim();
        });
        return { attrs: attrs, body: body };
      }

      /** Removes a single leading Markdown ATX # heading so it is not duplicated under the date header. */
      function stripLeadingAtxH1(body) {
        return body.replace(/^\s*#\s+[^\r\n]+(?:\r\n|\r|\n)?/, "");
      }

      function showError(msg) {
        document.getElementById("page-title").textContent = "Briefing";
        document.getElementById("main").innerHTML = '<div class="error" role="alert">' + msg + "</div>";
        document.getElementById("footer").hidden = true;
      }

      marked.setOptions({
        gfm: true,
        breaks: true,
        mangle: false,
        headerIds: true
      });

      fetch(BRIEFING_URL, { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("Could not load <code>" + BRIEFING_URL + "</code> (" + r.status + ").");
          return r.text();
        })
        .then(function (raw) {
          var parsed = parseFrontMatter(raw);
          var attrs = parsed.attrs;
          var body = stripLeadingAtxH1(parsed.body);
          var dateStr = attrs.date || "";

          if (!ISO_DATE.test(dateStr)) {
            throw new Error(
              "Add a valid ISO date in the YAML front matter of <code>briefings/latest.md</code>, for example:<br><code>---<br>date: 2026-08-04<br>---</code>"
            );
          }

          document.getElementById("page-title").textContent = dateStr;
          document.title = "Briefing · " + dateStr;

          var fetchedAt = new Date();
          document.getElementById("footer-meta").textContent =
            "Loaded " + fetchedAt.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }) + ".";

          var html = marked.parse(body);
          var clean = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
          document.getElementById("main").innerHTML = '<article class="content">' + clean + "</article>";
          document.getElementById("footer").hidden = false;
        })
        .catch(function (e) {
          showError(
            (e && e.message ? e.message : "Failed to load briefing.") +
              " Commit and push <code>briefings/latest.md</code> to the <code>main</code> branch and ensure GitHub Pages is enabled."
          );
        });
    })();
  </script>
</body>
</html>
